# Build and deploy Svelte website to GitHub Pages

name: Deploy Svelte Site

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: svelte-web/package-lock.json

      - name: Install dependencies
        run: |
          cd svelte-web
          npm ci

      - name: Build
        run: |
          cd svelte-web
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          FOLDER: svelte-web/build
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
